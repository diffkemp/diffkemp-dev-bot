name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint
      - name: Check code format
        run: npm run format:check
      - name: Build sources to JavaScript
        run: npm run build
